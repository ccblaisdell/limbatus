# limbatus user config (merged on top of the shield's own defaults).
#
# The XIAO BLE board definition already wires up battery reporting (zmk,battery
# voltage divider) and USB, so nothing is needed here for power. Uncomment the
# options below to taste.

# Report battery level over BLE (HID + reconnection).
CONFIG_ZMK_BATTERY_REPORTING=y

# Deep-sleep after 30 min idle to save the direct-solder LiPo.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Uncomment to debug over USB serial (adds a CDC-ACM console).
# CONFIG_ZMK_USB_LOGGING=y
