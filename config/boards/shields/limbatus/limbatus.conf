# limbatus shield hardware requirements.
#
# R5 of the matrix is wired to NFC1 (nRF52840 P0.09), which powers up as an NFC
# antenna pin. This tells the SoC to use P0.09/P0.10 as ordinary GPIO instead,
# writing the NFCPINS setting into UICR on first boot. Required for R5 to scan.
CONFIG_NFCT_PINS_AS_GPIOS=y
