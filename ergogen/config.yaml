meta:
  engine: 4.1.0

units:
  kx: cx
  ky: cy

  $default_width: cx
  $default_height: cy

  cpx: 1 + kx / 2
  cpy: 1 + ky / 2

  # 2 or 3 thumb keys per side.
  thumb_keys_per_side: 2

  # Negative values rotate each half inward (mirrored on the right).
  inward_rotation: -12

  total_matrix_splay: 6
  half_separation: 105

  board_padding_top: 10
  board_padding_horizontal: 10
  board_padding_bottom: 0

  xiao_length: 21
  xiao_width: 17.5
  xiao_left_clearance: 4
  # Optional extra inset of the MCU from the top board edge. Currently 0: the
  # local/xiao_ble footprint already clears the edge once its in-board cut
  # slots are removed. Knob kept symmetric with power_switch_top_clearance.
  xiao_top_clearance: 0

  power_switch_right_clearance: -4
  power_switch_width: 6.7
  power_switch_length: 2.6
  # Inset the power switch from the top board edge so its pads keep >=0.2mm
  # copper-to-edge clearance (KiBot DRC threshold); 0.5 yields ~0.275mm.
  power_switch_top_clearance: 0.5

  # Potential battery (NOTE: this linked 95x25 cell is too large for the
  # top-center pocket — it overlaps the staggered top keys. The pocket fits
  # roughly <=82mm wide x <=23mm tall. Using a fitting placeholder size below;
  # set these to the actual cell's dimensions before ordering the PCB.):
  # https://www.aliexpress.us/item/3256811651980837.html?spm=a2g0o.productlist.main.1.874bCamZCamZnD&algo_pvid=184459c6-e4ee-462b-abdb-a83167f5777b&algo_exp_id=184459c6-e4ee-462b-abdb-a83167f5777b-0&pdp_ext_f=%7B%22order%22%3A%2220%22%2C%22eval%22%3A%221%22%2C%22fromPage%22%3A%22search%22%7D&pdp_npi=6%40dis%21USD%215.92%214.12%21%21%2140.10%2127.90%21%4021033d1217827593902686380efa2d%2112000056743681156%21sea%21US%210%21ABX%211%210%21n_tag%3A-29910%3Bd%3A42c0f6c4%3Bm03_new_user%3A-29895%3BpisId%3A5000000208023469&curPageLogUid=MCxXjDzTmaEi&utparam-url=scene%3Asearch%7Cquery_from%3A%7Cx_object_id%3A1005011838295589%7C_p_origin_prod%3A
  battery_width: 80
  battery_length: 20
  battery_thickness: 4.0
  battery_top_clearance: 2

  # Through-PCB cutout under the battery body so the cell sits ~1 board
  # thickness lower (a little more height clearance). Inset inside the battery
  # footprint; the east (pad) side keeps a wider inset so the solder pads stay
  # on solid copper.
  battery_cutout_inset: 3
  battery_cutout_east_inset: 17

  case_switch_opening: 13.8
  case_component_clearance: 1
  case_usb_opening_width: 10
  case_usb_opening_depth: 4
  case_power_switch_opening_width: 8.5
  case_power_switch_opening_depth: 4

  # Mounting holes: the case boss passes up through the PCB, so the hole
  # clears the boss (case boss_diameter 6.5mm + tolerance). Holes are kept in
  # the rear/side margins where the wedge case is tall enough to host a boss.
  mounting_hole_diameter: 7.0

points:
  mirror: 0
  zones:
    left_matrix:
      anchor:
        shift: [-half_separation, 0]
      rotate: inward_rotation
      key:
        padding: ky
        spread: kx
        tags: [key, left]
      columns:
        pinky:
          key:
            column_net: C0
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3
        ring:
          key:
            splay: -total_matrix_splay / 2
            spread: kx + 0.5
            stagger: ky - 2
            column_net: C1
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3
        middle:
          key:
            splay: -total_matrix_splay / 2
            spread: kx + 0.5
            stagger: 3
            column_net: C2
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3
        pointer:
          key:
            stagger: -6
            column_net: C3
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3
        inner:
          key:
            stagger: -2
            column_net: C4
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3

    left_thumbs:
      anchor:
        ref: left_matrix_pointer_bottom
        # Offset the cluster ~half a key toward board center so the thumbs are
        # not column-aligned with the matrix keys directly above them.
        shift: [kx / 2, -ky]
      key:
        padding: ky
        spread: kx
        tags: [key, left, thumb]
      columns:
        tucky:
          key:
            # Drop the outer thumb key down onto the same plane as the inner
            # (middle) thumb key so it no longer rides up into the pointer/inner
            # matrix columns. Lands ~1u to middle's side, no overlap.
            shift: [0, -2]
            column_net: C5
            row_net: R0
            mirror.row_net: R3
        middle:
          key:
            shift: [0, -2]
            column_net: C5
            row_net: R1
            mirror.row_net: R4
        reachy:
          key:
            shift: [0, -4]
            column_net: C5
            row_net: R2
            mirror.row_net: R5
            # Optional 3rd thumb key.
            skip: true
      rows:
        cluster:

    rect_top_left:
      mirror: {}
      anchor:
        shift: [-board_padding_horizontal, board_padding_top]
        aggregate:
          method: intersect
          parts:
            - ref: left_matrix_pinky_bottom
              shift: [-kx, 0]
              rotate: total_matrix_splay
            - ref: left_matrix_ring_top
              shift: [0, ky / 2]
              rotate: 90 + total_matrix_splay / 2 - inward_rotation / 2
      key:
        tags: [bounds]

    rect_top_right:
      anchor:
        ref: mirror_rect_top_left
      key:
        tags: [bounds]
        asym: source

    rect_bottom_left:
      mirror: {}
      anchor:
        aggregate:
          method: intersect
          parts:
            - ref: rect_top_left
            - ref: left_thumbs_reachy_cluster
              shift: [6ky, 0]
              rotate: 90 - inward_rotation
      key:
        tags: [bounds]

    rect_bottom_right:
      anchor:
        ref: mirror_rect_bottom_left
      key:
        tags: [bounds]
        asym: source

    mcu_xiao:
      key.tags: [mcu]
      anchor:
        ref: rect_top_left
        shift:
          [
            xiao_left_clearance + xiao_width / 2,
            -xiao_length / 2 - xiao_top_clearance,
          ]

    power_switch:
      key:
        tags: [power_switch]
        asym: source
      anchor:
        ref: rect_top_right
        shift:
          [
            power_switch_right_clearance - power_switch_width / 2,
            -power_switch_length / 2 - power_switch_top_clearance,
          ]

    battery_pack:
      key:
        tags: [battery]
        asym: source
      anchor:
        - affect: x
        - ref: rect_top_left
          shift: [0, board_padding_horizontal - battery_length - battery_top_clearance]
          affect: y

    # Case-mounting holes. Only the three left-side holes are declared; the
    # global mirror (points.mirror) creates the right-side counterparts.
    # Positions are in the rear/side margins (y <= -17, clear of all keys,
    # diodes, MCU, battery, power switch) where the wedge case has enough
    # height to host a boss. spread/padding 0 so each column is placed purely
    # by its explicit shift.
    mounting:
      anchor:
        shift: [0, 0]
      key:
        tags: [mount]
        spread: 0
        padding: 0
      columns:
        # ergogen +y is the rear (KiCad -y); these land at the MCU/battery end.
        top:
          key:
            shift: [-58, 81]
        side_upper:
          key:
            shift: [-117, 50]
        side_lower:
          key:
            shift: [-117, 25]
      rows:
        only:

outlines:
  _demo:
    - what: rectangle
      where: [key]
      size: [kx, ky]

  _xiao_debug:
    - what: rectangle
      where: mcu_xiao
      size: [xiao_width, xiao_length]

  _battery_debug:
    - what: rectangle
      where: battery_pack
      size: [battery_width, battery_length]

  _power_switch_debug:
    - what: rectangle
      where: power_switch
      size: [power_switch_width, power_switch_length]

  case_switch_plate:
    - what: rectangle
      where: [key]
      size: [case_switch_opening, case_switch_opening]

  case_xiao_cavity:
    - what: rectangle
      where: mcu_xiao
      size:
        [
          xiao_width + case_component_clearance * 2,
          xiao_length + case_component_clearance * 2,
        ]

  case_battery_cavity:
    - what: rectangle
      where: battery_pack
      size:
        [
          battery_width + case_component_clearance * 2,
          battery_length + case_component_clearance * 2,
        ]

  case_power_switch_cavity:
    - what: rectangle
      where: power_switch
      size:
        [
          power_switch_width + case_component_clearance * 2,
          power_switch_length + case_component_clearance * 2,
        ]

  case_usb_opening:
    - what: rectangle
      where: mcu_xiao
      adjust:
        shift: [0, xiao_length / 2 - case_usb_opening_depth / 2]
      size: [case_usb_opening_width, case_usb_opening_depth]

  case_power_switch_opening:
    - what: rectangle
      where: power_switch
      adjust:
        shift:
          [0, power_switch_length / 2 - case_power_switch_opening_depth / 2]
      size:
        [case_power_switch_opening_width, case_power_switch_opening_depth]

  _outer_rect:
    - what: polygon
      joints: pointy
      fillet: 2
      points:
        - ref: rect_top_left
        - ref: rect_top_right
        - ref: rect_bottom_right
        - ref: rect_bottom_left

  # Battery rest cutout (PCB only — the case perimeter stays solid so the
  # battery rests on the tray). West-biased so it clears the east solder pads.
  _battery_cutout:
    - what: rectangle
      where: battery_pack
      adjust:
        shift: [(battery_cutout_inset - battery_cutout_east_inset) / 2, 0]
      size:
        [
          battery_width - battery_cutout_inset - battery_cutout_east_inset,
          battery_length - 2 * battery_cutout_inset,
        ]

  board:
    - name: _outer_rect
    - operation: subtract
      name: _battery_cutout

  case_perimeter:
    - name: _outer_rect

  # Through-PCB mounting holes for the case bosses. Diameter clears the boss
  # that rises through the board. The case derives boss/insert/screw features
  # from this same outline (offsets), keeping ergogen the single source of
  # truth for the XY positions.
  case_mounting_holes:
    - what: circle
      where: mount
      radius: mounting_hole_diameter / 2

  debug:
    - name: board
    - operation: stack
      name: _demo
    - operation: stack
      name: _xiao_debug
    - operation: stack
      name: _battery_debug
    - operation: stack
      name: _power_switch_debug
    - operation: stack
      name: case_mounting_holes

pcbs:
  limbatus:
    template: kicad8
    outlines:
      main:
        outline: board
    footprints:
      switches:
        what: ceoloide/switch_choc_v1_v2
        where: [key]
        params:
          choc_v2_support: false
          reversible: false
          hotswap: true
          include_corner_marks: true
          include_keycap: true
          include_centerhole_net: true
          keycap_height: ky
          keycap_width: kx

          # Matrix wiring scaffold.
          from: "{{column_net}}"
          to: "SW_{{name}}"

      diodes:
        what: ceoloide/diode_tht_sod123
        where: [key]
        adjust:
          # Tuck the diode just south of the switch center (over the hotswap
          # socket, which is on the opposite copper layer) so it reads as
          # belonging to its own switch rather than the gap below it.
          shift: [0, -5.0]
        params:
          side: F
          from: "SW_{{name}}"
          to: "{{row_net}}"

      xiao_ble:
        what: local/xiao_ble
        where: mcu_xiao
        params:
          P0: C0
          P1: C1
          P2: C2
          P3: C3
          P4: C4
          P5: C5
          P6: R0
          P7: R1
          P8: R2
          P9: R3
          P10: R4
          NFC1: R5

      power_switch:
        what: ceoloide/power_switch_smd_side
        where: power_switch
        adjust:
          rotate: 90
        params:
          reversible: false
          from: Braw
          to: RAW

      battery_pads:
        what: local/battery_pads_solder
        where: battery_pack
        adjust:
          shift: [battery_width / 2 - 5, 0]
          rotate: 90
        params:
          side: F
          BAT_P: Braw
          BAT_N: GND

      mounting_holes:
        what: ceoloide/mounting_hole_npth
        where: mount
        params:
          hole_size: mounting_hole_diameter
          hole_drill: mounting_hole_diameter
