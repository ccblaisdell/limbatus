meta:
  engine: 4.1.0

units:
  kx: cx
  ky: cy

  $default_width: cx
  $default_height: cy

  cpx: 1 + kx / 2
  cpy: 1 + ky / 2

  # 2 or 3 thumb keys per side.
  thumb_keys_per_side: 2

  # Negative values rotate each half inward (mirrored on the right).
  inward_rotation: -12

  total_matrix_splay: 6
  half_separation: 105

  board_padding_top: 10
  board_padding_horizontal: 10
  board_padding_bottom: 0

  xiao_length: 21
  xiao_width: 17.5
  # USB exits the LEFT board edge (XIAO rotated 90deg, see points.mcu_xiao).
  # 0 keeps the connector flush with the left edge so the plug can breach the
  # case wall via case_usb_opening -- the pad-free USB end clears the edge fine,
  # exactly as the rear edge did before the rotation.
  xiao_left_clearance: 0
  # After the 90deg rotation the rear board edge hosts a castellated pad row
  # (previously the pad-free short end faced it). Inset the MCU from the rear
  # edge so those pads keep >=0.2mm copper-to-edge (KiBot DRC); 2mm yields
  # ~1.75mm. Knob kept symmetric with power_switch_top_clearance.
  #
  # Bumped 2 -> 4 (2026-07-09): moves the whole NW cluster (XIAO + the
  # power switch and USB opening derived from it) ~2mm SOUTH, opening a
  # routing channel along the north edge above the MCU castellation fanout
  # -- the congested spot that leaves the MCU-corner GND pour fragmented on
  # the autorouted preview. The power switch stays clear of MH2 (~0.9mm pad
  # gap; boss keepout still met). Pads now sit ~3.75mm off the rear edge.
  xiao_top_clearance: 4

  # Power switch is WEST-facing (actuator points out the left board edge) and
  # sits just SOUTH of the USB port -- i.e. immediately below the XIAO in the
  # left margin -- so the slide actuator breaches the west case wall through
  # case_power_switch_opening, right under the USB opening. The XIAO body spans
  # the whole west edge down to xiao_width/2 below its center, so "just south of
  # the USB" is the first clear west-edge spot: just below the XIAO south edge.
  # power_switch_south_gap = XIAO south edge -> switch north edge. Kept at 5mm
  # (not hard up against the XIAO) so a soldering iron can reach the switch's
  # north pads without fouling the adjacent MCU / its castellated pad row.
  power_switch_south_gap: 5.0
  power_switch_width: 6.7
  power_switch_length: 2.6
  # Inset the switch from the WEST board edge so its mounting-tab pads keep
  # >=0.2mm copper-to-edge clearance (KiBot DRC threshold). Measured to the
  # switch body's west edge; the tabs overhang ~0.325mm past it, so 1.0 yields
  # ~0.675mm pad-to-edge.
  power_switch_west_clearance: 1.0

  # Battery: 60 x 20 x 6mm LiPo cell (W x L x thickness), e.g. a 602060 pouch
  # (~600-700mAh). Sits in the top-center pocket with generous room for a
  # plate-level case wall between the cell and the neighbouring top-row switches.
  # The tight axis (20mm, battery_length) stays well under the ~23mm pocket
  # limit set by the pinky/ring top keys; the 60mm axis has slack (pocket fits
  # up to ~82mm wide). Set these to the actual cell's dimensions before ordering.
  battery_width: 60
  battery_length: 20
  # Thickness grows into case depth, not key clearance (the cell sits under a
  # solid lid, clear of the keys). When the battery compartment is actually
  # modelled, confirm the case rear height hosts 6mm + battery_z_clearance.
  battery_thickness: 6.0
  # Distance from the board top edge to the cell. Set >= wall_thickness (2.5)
  # so the drop-in pocket starts at/inside the case wall and leaves a solid
  # north board strip rather than undercutting the wall.
  battery_top_clearance: 3

  # Drop-in battery pocket.
  # The cutout is the FULL cell footprint plus a small clearance, so the cell
  # drops THROUGH the PCB and rests on the bottom-tray floor ~1 board thickness
  # lower (a bit more height clearance, and the cell can be a touch taller).
  # The pocket is centered on the battery; the solder pads sit on solid copper
  # just west of it (battery_pad_gap). Pocket and pads both track
  # battery_width/length, so swapping to a different cell size needs no other
  # edits. battery_pocket_clearance = gap between the cell and the pocket walls.
  battery_pocket_clearance: 0.5
  # Gap between the pocket's west edge and the solder pads. Wide enough to host
  # the cell's protection board (PCM) + short leads when the JST connector is
  # snipped off: orient the cell so its wire/PCM end faces WEST (toward these
  # pads). 8mm keeps the pads ~6mm clear of the nearest keycap (ample room in
  # the rear margin). See BUILD.md step 5.
  battery_pad_gap: 8

  case_switch_opening: 13.8
  case_component_clearance: 1
  case_usb_opening_width: 10
  case_usb_opening_depth: 4
  case_power_switch_opening_width: 8.5
  case_power_switch_opening_depth: 4

  # --- Bottom-tray underside relief (things that protrude BELOW the PCB) ---
  # The XIAO is on F.Cu (component face toward the top shell), so the bottom
  # tray only has to clear per-switch hardware. Two protruding classes, in the
  # switch-local frame (these rectangles/circles are placed `where: [key]`, so
  # they inherit each key's splay + mirror automatically):
  #   1. Kailh Choc hotswap socket, soldered to B.Cu just NORTH of the key
  #      center (matches the diode note: socket is on the opposite layer). The
  #      socket has two round contact cups over the switch pin holes at
  #      (0,-5.95) and (5,-3.75); its plastic body + solder tabs span the
  #      B.SilkS outline ~x[-2..7], y[-8.2..-1.5] (pad centers at x=-3.275 and
  #      x=8.275). We trace this as TWO overlapping circles (one per cup) that
  #      union into the real peanut/bowtie silhouette -- far tighter than the
  #      old bounding rectangle, so the tray floor keeps more material. The
  #      shape is asymmetric (side cup to +x); it auto-mirrors on the right
  #      half because it is placed `where: [key]` (verified: a +x local shift
  #      lands -x on mirrored keys).
  #   2. Switch through-holes on the key centerline (choc v1 defaults, since
  #      choc_v2_support:false): center pole hole (3.4mm) at (0,0) and two
  #      stabilizer boss holes (1.9mm) at x = +/-5.5.
  # underside_relief_clearance pads every edge so the pocket is a clearance
  # fit, not a press fit. Tune here; the case DXF regenerates on `make build`.
  underside_relief_clearance: 0.5
  # Socket cup radius. Effective radius = this + underside_relief_clearance.
  # 2.8 -> 3.3mm cups: reach both solder-pad centers (+/-3.275 from each cup)
  # and every B.SilkS corner, while overlapping into a single loop per socket.
  hotswap_lobe_radius: 2.8
  hotswap_socket_pin1_x: 0       # inner/center contact cup (middle pin hole)
  hotswap_socket_pin1_y: -5.95
  hotswap_socket_pin2_x: 5       # side contact cup (side pin hole)
  hotswap_socket_pin2_y: -3.75
  switch_center_hole_diameter: 3.4  # choc v1 center pole
  switch_stab_hole_diameter: 1.9    # choc v1 stabilizer bosses
  switch_stab_hole_x: 5.5           # +/- X of the stabilizer bosses

  # Mounting holes: the case boss passes up through the PCB, so the hole
  # clears the boss (case boss_diameter 6.5mm + tolerance). Holes are kept in
  # the rear/side margins where the wedge case is tall enough to host a boss.
  mounting_hole_diameter: 7.0

points:
  mirror: 0
  zones:
    left_matrix:
      anchor:
        shift: [-half_separation, 0]
      rotate: inward_rotation
      key:
        padding: ky
        spread: kx
        tags: [key, left]
      columns:
        pinky:
          key:
            column_net: C0
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3
        ring:
          key:
            splay: -total_matrix_splay / 2
            spread: kx + 0.5
            stagger: ky - 2
            column_net: C1
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3
        middle:
          key:
            splay: -total_matrix_splay / 2
            spread: kx + 0.5
            stagger: 3
            column_net: C2
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3
        pointer:
          key:
            stagger: -6
            column_net: C3
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3
        inner:
          key:
            stagger: -2
            column_net: C4
          rows:
            bottom:
              row_net: R2
              mirror.row_net: R5
            home:
              row_net: R1
              mirror.row_net: R4
            top:
              row_net: R0
              mirror.row_net: R3

    left_thumbs:
      anchor:
        ref: left_matrix_pointer_bottom
        # Offset the cluster ~half a key toward board center so the thumbs are
        # not column-aligned with the matrix keys directly above them.
        shift: [kx / 2, -ky]
      key:
        padding: ky
        spread: kx
        tags: [key, left, thumb]
      columns:
        tucky:
          key:
            # Drop the outer thumb key down onto the same plane as the inner
            # (middle) thumb key so it no longer rides up into the pointer/inner
            # matrix columns. Lands ~1u to middle's side, no overlap.
            shift: [0, -2]
            column_net: C5
            row_net: R0
            mirror.row_net: R3
        middle:
          key:
            shift: [0, -2]
            column_net: C5
            row_net: R1
            mirror.row_net: R4
        reachy:
          key:
            shift: [0, -4]
            column_net: C5
            row_net: R2
            mirror.row_net: R5
            # Optional 3rd thumb key.
            skip: true
      rows:
        cluster:

    rect_top_left:
      mirror: {}
      anchor:
        shift: [-board_padding_horizontal, board_padding_top]
        aggregate:
          method: intersect
          parts:
            - ref: left_matrix_pinky_bottom
              shift: [-kx, 0]
              rotate: total_matrix_splay
            - ref: left_matrix_ring_top
              shift: [0, ky / 2]
              rotate: 90 + total_matrix_splay / 2 - inward_rotation / 2
      key:
        tags: [bounds]

    rect_top_right:
      anchor:
        ref: mirror_rect_top_left
      key:
        tags: [bounds]
        asym: source

    rect_bottom_left:
      mirror: {}
      anchor:
        aggregate:
          method: intersect
          parts:
            - ref: rect_top_left
            - ref: left_thumbs_reachy_cluster
              shift: [6ky, 0]
              rotate: 90 - inward_rotation
      key:
        tags: [bounds]

    rect_bottom_right:
      anchor:
        ref: mirror_rect_bottom_left
      key:
        tags: [bounds]
        asym: source

    mcu_xiao:
      key:
        tags: [mcu]
        # Rotate the XIAO 90deg CCW so the USB connector exits the LEFT board
        # edge instead of the rear. This lets the board sit on a laptop and be
        # used while plugged in without the cable fouling the screen hinge.
        # Rotating the POINT (not just the footprint) keeps the cavity and
        # USB-opening outlines, which both reference mcu_xiao, in sync.
        rotate: 90
      anchor:
        ref: rect_top_left
        shift:
          [
            xiao_left_clearance + xiao_length / 2,
            -xiao_width / 2 - xiao_top_clearance,
          ]

    power_switch:
      key:
        tags: [power_switch]
        asym: source
        # Rotate the point 90deg (CCW) like the XIAO so the switch, its cavity,
        # and its wall opening all face WEST. Combined with the footprint's own
        # adjust.rotate 90 (see pcbs.power_switch) the footprint lands at 180deg:
        # actuator out the west edge, signal/tab pads facing inland (east).
        rotate: 90
      anchor:
        ref: rect_top_left
        # West edge, just below the XIAO south edge (see power_switch_* notes).
        shift:
          [
            xiao_left_clearance + power_switch_west_clearance + power_switch_length / 2,
            -xiao_width - xiao_top_clearance - power_switch_south_gap - power_switch_width / 2,
          ]

    battery_pack:
      key:
        tags: [battery]
        asym: source
      anchor:
        - affect: x
        - ref: rect_top_left
          # Center the cell so its top (rear) edge sits battery_top_clearance
          # below the board rear edge, independent of battery_length.
          shift: [0, 0 - battery_top_clearance - battery_length / 2]
          affect: y

    # Case-mounting holes. Three left-side holes are declared; the global
    # mirror (points.mirror) creates the right-side counterparts. A seventh
    # hole sits on the center line (x = 0) to tie the two shell halves
    # together in the middle; it is asym:source so the x=0 mirror does not
    # stamp a coincident duplicate.
    # Positions are in the rear/side margins (y <= -17, clear of all keys,
    # diodes, MCU, battery, power switch) where the wedge case has enough
    # height to host a boss. spread/padding 0 so each column is placed purely
    # by its explicit shift.
    mounting:
      anchor:
        shift: [0, 0]
      key:
        tags: [mount]
        spread: 0
        padding: 0
      columns:
        # ergogen +y is the rear (KiCad -y); these land at the MCU/battery end.
        top:
          key:
            shift: [-58, 81]
        side_upper:
          key:
            shift: [-117, 50]
        side_lower:
          key:
            shift: [-117, 25]
        # Center-line hole between the two halves. Shares the y of the
        # side_lower holes (y=25) so all three lowest bosses sit on one line.
        # x=0 lands in the wide central gap between the inner key columns,
        # well clear of any switch. asym:source so the x=0 global mirror keeps
        # it single, not doubled.
        center:
          key:
            shift: [0, 25]
            asym: source
      rows:
        only:

    # GND plane stitching vias. The board carries GND pours on BOTH copper
    # layers, but they only tie together where a through-hole GND pad happens to
    # land (essentially just the XIAO castellations). These vias short the two
    # planes through their barrels, improving ground integrity and giving cleaner
    # RF return paths on this 2.4GHz BLE board. Positions sit on solid GND copper
    # clear of keys/diodes/MCU/battery/power switch, using the same rear/side
    # margin logic as `mounting`: three left-side/rear margin vias whose
    # right-side counterparts the global mirror stamps automatically (six total).
    #
    # NO central x=0 corridor vias (2026-07-09): two used to sit there, but on the
    # autorouted preview the row traces that cross the center corridor box off an
    # E-W strip of the F.Cu pour, and a via inside that strip PINS it as a floating
    # island that `remove_islands: always` can no longer drop -- surfacing as a
    # "Zone GND on F.Cu unconnected" DRC error. Confirmed on the real failing CI
    # board: deleting the two center vias took its GND-zone-unconnected count 2->1,
    # with zero signal-routing or plane-tie regression across controlled runs. The
    # margin vias below tie the planes where copper is continuous. See the
    # ci-autoroute-flaky memory for the full A/B.
    stitch:
      anchor:
        shift: [0, 0]
      key:
        tags: [stitch]
        spread: 0
        padding: 0
      columns:
        # Rear margin, between the battery cutout (x within +/-30) and the MCU
        # (x <= -103). Mirrored to the right rear margin.
        rear_inner:
          key:
            shift: [-40, 80]
        rear_outer:
          key:
            shift: [-75, 80]
        # West side margin, between the two side mounting holes (y 25 & 50) and
        # south of the power switch. Mirrored to the east side margin.
        side_mid:
          key:
            shift: [-117, 37]
      rows:
        only:

    # Zero-position anchor for the GND copper pours. Sits at ergogen (0,0) ->
    # KiCad (0,0), so the filled_zone footprints' absolute polygon points are
    # not shifted by a footprint origin.
    board_origin:
      key:
        tags: [origin]
        asym: source

outlines:
  _demo:
    - what: rectangle
      where: [key]
      size: [kx, ky]

  _xiao_debug:
    - what: rectangle
      where: mcu_xiao
      size: [xiao_width, xiao_length]

  _battery_debug:
    - what: rectangle
      where: battery_pack
      size: [battery_width, battery_length]

  _power_switch_debug:
    - what: rectangle
      where: power_switch
      size: [power_switch_width, power_switch_length]

  case_switch_plate:
    - what: rectangle
      where: [key]
      size: [case_switch_opening, case_switch_opening]

  case_xiao_cavity:
    - what: rectangle
      where: mcu_xiao
      size:
        [
          xiao_width + case_component_clearance * 2,
          xiao_length + case_component_clearance * 2,
        ]

  case_battery_cavity:
    - what: rectangle
      where: battery_pack
      size:
        [
          battery_width + case_component_clearance * 2,
          battery_length + case_component_clearance * 2,
        ]

  case_power_switch_cavity:
    - what: rectangle
      where: power_switch
      size:
        [
          power_switch_width + case_component_clearance * 2,
          power_switch_length + case_component_clearance * 2,
        ]

  case_usb_opening:
    - what: rectangle
      where: mcu_xiao
      adjust:
        shift: [0, xiao_length / 2 - case_usb_opening_depth / 2]
      size: [case_usb_opening_width, case_usb_opening_depth]

  # Actuator slot in the WEST wall. The switch is inset power_switch_west_clearance
  # from the board edge for pad DRC, so push the opening the same amount further
  # west (past the switch body edge) to land its outer edge on the board edge and
  # fully breach the wall -- exactly like case_usb_opening reaches the edge.
  case_power_switch_opening:
    - what: rectangle
      where: power_switch
      adjust:
        shift:
          [
            0,
            power_switch_length / 2 + power_switch_west_clearance - case_power_switch_opening_depth / 2,
          ]
      size:
        [case_power_switch_opening_width, case_power_switch_opening_depth]

  # --- Bottom-tray underside relief -------------------------------------
  # Per-switch pocket tracing the Choc hotswap socket silhouette (B.Cu, north
  # of the key center): two overlapping circles over the contact cups at the
  # switch pin holes, unioned into one peanut/bowtie loop per key. Tight to the
  # socket body (vs the earlier bounding rectangle) so the tray floor keeps
  # more material.
  case_hotswap_clearance:
    - what: circle
      where: [key]
      adjust:
        shift: [hotswap_socket_pin1_x, hotswap_socket_pin1_y]
      radius: hotswap_lobe_radius + underside_relief_clearance
    - what: circle
      where: [key]
      adjust:
        shift: [hotswap_socket_pin2_x, hotswap_socket_pin2_y]
      radius: hotswap_lobe_radius + underside_relief_clearance
      operation: add

  # Switch through-holes on the key centerline: center pole (Ø3.4) plus the
  # two choc v1 stabilizer bosses (Ø1.9) at x = +/-5.5. These sit at y=0,
  # just south of the hotswap rectangle, so they are their own shapes.
  case_switch_holes:
    - what: circle
      where: [key]
      radius: switch_center_hole_diameter / 2 + underside_relief_clearance
    - what: circle
      where: [key]
      adjust:
        shift: [-switch_stab_hole_x, 0]
      radius: switch_stab_hole_diameter / 2 + underside_relief_clearance
      operation: add
    - what: circle
      where: [key]
      adjust:
        shift: [switch_stab_hole_x, 0]
      radius: switch_stab_hole_diameter / 2 + underside_relief_clearance
      operation: add

  # Combined cutout for the bottom tray: hotswap sockets + switch through-holes,
  # unioned. Import this single DXF onto the tray floor in Onshape and cut. Case
  # mounting holes are intentionally NOT included (they are bosses, not relief).
  bottom_tray_cutouts:
    - name: case_hotswap_clearance
    - operation: add
      name: case_switch_holes

  # --- Switch-plate voids (top shell) -----------------------------------
  # Every void that passes through / is recessed into the switch plate, unioned
  # into one DXF for a single Onshape import: the per-key switch openings plus
  # the XIAO, battery, and power-switch component cavities, and the USB-C wall
  # opening. These reuse the existing single-purpose outlines above so there is
  # one source of truth for each shape. NOT included (they are wall/edge
  # breaches or bosses, not plate voids): case_power_switch_opening,
  # case_mounting_holes.
  switch_plate_voids:
    - name: case_switch_plate
    - operation: add
      name: case_xiao_cavity
    - operation: add
      name: case_battery_cavity
    - operation: add
      name: case_power_switch_cavity
    - operation: add
      name: case_usb_opening

  _outer_rect:
    - what: polygon
      joints: pointy
      fillet: 2
      points:
        - ref: rect_top_left
        - ref: rect_top_right
        - ref: rect_bottom_right
        - ref: rect_bottom_left

  # Battery rest cutout (PCB only — the case perimeter stays solid so the
  # battery rests on the tray). Centered on the cell; the solder pads sit just
  # beyond its west edge (see battery_pads) so they stay clear of the cutout.
  _battery_cutout:
    - what: rectangle
      where: battery_pack
      # Slightly rounded inside corners (eases the cell drop-in; LiPo pouches
      # have rounded corners) and avoids sharp internal stress risers.
      corner: 1.5
      size:
        [
          battery_width + 2 * battery_pocket_clearance,
          battery_length + 2 * battery_pocket_clearance,
        ]

  board:
    - name: _outer_rect
    - operation: subtract
      name: _battery_cutout

  case_perimeter:
    - name: _outer_rect

  # Through-PCB mounting holes for the case bosses. Diameter clears the boss
  # that rises through the board. The case derives boss/insert/screw features
  # from this same outline (offsets), keeping ergogen the single source of
  # truth for the XY positions.
  case_mounting_holes:
    - what: circle
      where: mount
      radius: mounting_hole_diameter / 2

  # --- Self-registering ("aligned") variants for CAD import -------------
  # A voids-only DXF has an asymmetric bounding box (the XIAO + power-switch
  # cavities weight it to one side), so tools that place a DXF by centering its
  # bbox (e.g. Onshape "Insert DXF") drop it off-center from the real board.
  # These variants `stack` (NOT union -- union would swallow the inner voids)
  # the symmetric board perimeter and the mounting-hole circles onto the voids,
  # so the file's bbox equals the board and it self-registers. Import one of
  # these, then in CAD constrain the perimeter rectangle (translation +
  # orientation) and/or the mounting-hole circles (concentric = exact XY +
  # rotation lock) to your modeled board; the void loops then sit correctly.
  # The plain voids-only outlines (switch_plate_voids / bottom_tray_cutouts)
  # are kept for coordinate-preserving import workflows.
  switch_plate_voids_aligned:
    - name: case_perimeter
    - operation: stack
      name: case_mounting_holes
    - operation: stack
      name: switch_plate_voids

  bottom_tray_cutouts_aligned:
    - name: case_perimeter
    - operation: stack
      name: case_mounting_holes
    - operation: stack
      name: bottom_tray_cutouts

  debug:
    - name: board
    - operation: stack
      name: _demo
    - operation: stack
      name: _xiao_debug
    - operation: stack
      name: _battery_debug
    - operation: stack
      name: _power_switch_debug
    - operation: stack
      name: case_mounting_holes
    - operation: stack
      name: bottom_tray_cutouts
    - operation: stack
      name: switch_plate_voids

pcbs:
  limbatus:
    template: kicad8
    outlines:
      main:
        outline: board
    footprints:
      switches:
        what: ceoloide/switch_choc_v1_v2
        where: [key]
        params:
          choc_v2_support: false
          reversible: false
          hotswap: true
          include_corner_marks: true
          include_keycap: true
          include_centerhole_net: true
          keycap_height: ky
          keycap_width: kx

          # 3D models (design-time visualization only; not fabrication data).
          # Paths use KiCad's built-in ${KIPRJMOD} (the dir holding the
          # .kicad_pcb, i.e. pcbs/) so they resolve with no KiCad path setup.
          # Offsets/rotations are the community-tuned values for this ceoloide
          # footprint on its default side B (switch + keycap render on -Z).
          # Sources/licenses: see ergogen/3dmodels/README.md.
          switch_3dmodel_filename: ${KIPRJMOD}/../ergogen/3dmodels/Choc_V1_Switch.step
          switch_3dmodel_xyz_offset: [0, 0, -1.2]
          switch_3dmodel_xyz_rotation: [0, 180, 180]
          hotswap_3dmodel_filename: ${KIPRJMOD}/../ergogen/3dmodels/Choc_V1_Hotswap.step
          hotswap_3dmodel_xyz_offset: [0, 0, -1.6]
          hotswap_3dmodel_xyz_rotation: [0, 180, 180]
          keycap_3dmodel_filename: ${KIPRJMOD}/../ergogen/3dmodels/Choc_V1_Keycap_MBK_White_1u.step
          keycap_3dmodel_xyz_offset: [0, 0, -8]
          keycap_3dmodel_xyz_rotation: [0, 180, 0]

          # Matrix wiring scaffold.
          from: "{{column_net}}"
          to: "SW_{{name}}"

      diodes:
        what: ceoloide/diode_tht_sod123
        where: [key]
        adjust:
          # Tuck the diode just south of the switch center (over the hotswap
          # socket, which is on the opposite copper layer) so it reads as
          # belonging to its own switch rather than the gap below it.
          shift: [0, -5.0]
        params:
          side: F
          from: "SW_{{name}}"
          to: "{{row_net}}"
          # 3D model: SnapEDA 1N4148W (SOD-123, matches this footprint).
          # See ergogen/3dmodels/README.md.
          diode_3dmodel_filename: ${KIPRJMOD}/../ergogen/3dmodels/Diode_1N4148W.step

      xiao_ble:
        what: local/xiao_ble
        where: mcu_xiao
        params:
          P0: C0
          P1: C1
          P2: C2
          P3: C3
          P4: C4
          P5: C5
          P6: R0
          P7: R1
          P8: R2
          P9: R3
          P10: R4
          NFC1: R5
          # Close the power loop: the XIAO's onboard PMIC is fed from its BAT+
          # pad. Battery+ -> Braw -> power switch -> RAW lands here, so the
          # switch actually cuts power to the MCU. Without this, RAW dead-ends
          # at the switch and BAT_POS is an isolated island (board gets no
          # power). BAT- returns to the shared GND net / pour.
          BAT_POS: RAW
          BAT_NEG: GND
          # 3D model: Seeed's official XIAO nRF52840 STEP (includes the BLE
          # chip antenna + USB-C). Seeed's mechanical export is authored in a
          # Y-up frame, length along X, width along Z, and offset from origin,
          # so it is NOT aligned to KiCad's footprint origin. The offset/rotation
          # below map it into KiCad's (Z-up) footprint frame; they were tuned
          # and verified visually in KiCad's footprint 3D tab.
          # See ergogen/3dmodels/README.md.
          xiao_3dmodel_filename: ${KIPRJMOD}/../ergogen/3dmodels/XIAO-nRF52840.step
          xiao_3dmodel_xyz_offset: [6.2, -1.6, 0]
          xiao_3dmodel_xyz_rotation: [90, 0, 90]

      power_switch:
        what: ceoloide/power_switch_smd_side
        where: power_switch
        adjust:
          rotate: 90
        params:
          reversible: false
          from: Braw
          to: RAW
          # 3D model: SnapEDA C&K PCM12SMTR slide switch. The footprint's own
          # adjust.rotate 90 spins it in-plane; this stands the model upright.
          # See ergogen/3dmodels/README.md.
          switch_3dmodel_filename: ${KIPRJMOD}/../ergogen/3dmodels/Switch_Power.step
          switch_3dmodel_xyz_rotation: [-90, 0, -90]

      battery_pads:
        what: local/battery_pads_solder
        where: battery_pack
        adjust:
          # On solid copper just WEST of the drop-in pocket (toward the XIAO /
          # power-switch cluster) so the battery -> switch -> XIAO power nets
          # stay short and clear of the matrix; tracks battery_width.
          shift: [-(battery_width / 2 + battery_pocket_clearance + battery_pad_gap), 0]
          rotate: 90
        params:
          side: F
          BAT_P: Braw
          BAT_N: GND

      battery_label:
        what: ceoloide/utility_text
        where: battery_pack
        adjust:
          # Just south of the drop-in pocket, on solid copper and centered
          # (clear of the west solder pads). Tracks battery_length so it
          # follows the pocket.
          shift: [0, -(battery_length / 2 + 3)]
        params:
          side: F
          layer: SilkS
          height: 1.2
          width: 1.2
          # Matches battery_width x battery_length x battery_thickness above.
          text: "60 x 20 x 6mm"

      mounting_holes:
        what: ceoloide/mounting_hole_npth
        where: mount
        params:
          hole_size: mounting_hole_diameter
          hole_drill: mounting_hole_diameter

      # Ergogen logo (5x5mm silkscreen). Dimetrodon tucks it just below the MCU;
      # here that spot is taken by the west-edge power switch, so place it in the
      # same clear central gap. BACK silk (mirrored automatically)
      ergogen_logo:
        what: ceoloide/utility_ergogen_logo
        where: board_origin
        adjust:
          shift: [0, 6]
        params:
          side: B
          scale: 1.0

      # Board identity + revision, back silk, in the central gap 
      # (the proven-clear board_origin cluster; nearest footprint
      # ~20mm away). Mirrored so it reads correctly from the hidden bottom face.
      # Bump `text` on board_rev whenever the board changes materially so stacked
      # respins are distinguishable on the bench.
      board_name:
        what: ceoloide/utility_text
        where: board_origin
        adjust:
          shift: [0, -4]
        params:
          side: B
          layer: SilkS
          mirrored: true
          height: 1.4
          width: 1.4
          text: "limbatus"

      board_rev:
        what: ceoloide/utility_text
        where: board_origin
        adjust:
          shift: [0, -8]
        params:
          side: B
          layer: SilkS
          mirrored: true
          height: 1
          width: 1
          text: "rev A  2026-07"

      # GND plane stitching vias (see points.stitch). Tented plated through-holes
      # on GND, dropped inside both pours so their barrels short the planes.
      stitching_vias:
        what: local/stitching_via
        where: stitch
        params:
          net: GND

      # RF antenna GND exclusion: REMOVED (2026-07-09, deliberate design call).
      # The GND pours below now fill SOLID under the XIAO's onboard BLE antenna.
      #
      # History: the antenna (a meander trace at the short end OPPOSITE the USB-C,
      # i.e. the east end of the module ~x-103.8) sits under the ground plane,
      # which detunes it. That was first mitigated by an xiao_antenna_keepout, then
      # -- because KiCad exports every rule-area keepout to the Specctra DSN as a
      # fully routing-BLOCKING `(keepout)` that stranded the NFC1/R5 pad at the
      # antenna tip -- by a NOTCH cut into these pours (same RF void, no routing
      # block). Both are now gone: the antenna already sits ~21mm inland (a
      # compromised RF spot inherent to the west-USB exit that the small void only
      # marginally helped), and a fully-continuous ground plane is simpler and less
      # prone to fragmenting into isolated pour islands. Net effect on BLE range is
      # expected to be minor; revisit with a XIAO reorientation if range
      # disappoints. See the xiao-antenna-opposite-usb memory.

      # Battery-cutout edge keepout. KiCad's "board edge clearance" DRC rule
      # (0.5mm) is NOT exported into the Specctra DSN, so freerouting only holds
      # its own small default off the internal battery cutout and routes tracks
      # right up to it (observed: an R-row track/arc 0.24mm from the cutout edge,
      # failing the 0.5mm rule). This keepout forbids TRACKS and VIAS in a 0.65mm
      # ring around the cutout so the autorouter keeps clear; freerouting honors
      # DSN keepouts. copperpour stays ALLOWED so the GND plane still fills up to
      # its own zone clearance -- we only push routed copper out, we do not carve
      # a wider hole in the plane. pads/footprints allowed (the battery solder
      # pads sit ~8mm west, outside this ring). Absolute KiCad coords like the
      # pours/antenna keepout (where: board_origin is only an anchor). The cutout
      # is x +/-30.5, y -85.862..-64.862 (battery 60x20 + 2x0.5 pocket clearance),
      # measured from the generated Edge.Cuts; expanded 0.65mm on every side.
      battery_edge_keepout:
        what: ceoloide/utility_keepout_zone
        where: board_origin
        params:
          side: F&B
          name: battery_edge
          copperpour_allowed: true
          tracks_allowed: false
          vias_allowed: false
          pads_allowed: true
          footprints_allowed: true
          points:
            [[-31.15, -86.512], [31.15, -86.512], [31.15, -64.212], [-31.15, -64.212]]

      # GND copper pours (front + back). KiCad clips the fill to the board edge
      # (and the battery cutout), so the rectangle just needs to over-cover the
      # board bbox (KiCad coords ~x +/-124.8, y -88.4..23.8; padded ~2mm). The
      # pour removes GND from the autorouter's job entirely: the Specctra DSN
      # export represents these as planes, so freerouting connects every GND
      # pad (battery -, XIAO, every switch/diode) to the plane instead of
      # routing individual GND traces. Anchored at board_origin (0,0) so the
      # absolute polygon points below are not shifted. The polygon is a plain
      # board-covering rectangle (no antenna notch anymore -- see above).
      #
      # GND-fill robustness (so the autorouted preview reports 0 unconnected items
      # regardless of how a given freerouting run slices the pour):
      #   connect_pads: yes  -- SOLID connection for every GND pad, not thermal
      #     relief. With thermal relief, if a run's tracks happen to block all of a
      #     pad's spokes the pad drops off the pour and DRC flags it unconnected
      #     (seen on the XIAO GND pads and stitching vias). Solid connection has no
      #     spokes to block. Trade-off: GND pads sink heat into the plane, so the
      #     XIAO castellations and the BAT- pad need a hotter iron / more dwell --
      #     see BUILD.md.
      #   remove_islands: always  -- drop any pour region a run isolates from the
      #     main plane, instead of leaving it as a floating "GND zone unconnected"
      #     island. The stitching vias (points.stitch) keep the two solid planes
      #     tied together.
      #
      # Fill is SOLID (utility_filled_zone default). A crosshatch fill was tried for
      # looks but solid copper connects pads/vias and ties the two planes far more
      # robustly (a thin hatch grid fragments around every trace/pad), and a solid
      # ground is better for the 2.4GHz BLE return paths. None of these settings
      # affect autorouting anyway: the pour is exported to the Specctra DSN as a
      # solid GND (plane) built from the zone OUTLINE, so freerouting never sees the
      # fill and still connects every GND pad to it.
      gnd_pour_front:
        what: ceoloide/utility_filled_zone
        where: board_origin
        params:
          side: F
          net: GND
          name: GND
          connect_pads: 'yes'
          remove_islands: 'always'
          points:
            [[-127, -90.5], [127, -90.5], [127, 26], [-127, 26]]

      gnd_pour_back:
        what: ceoloide/utility_filled_zone
        where: board_origin
        params:
          side: B
          net: GND
          name: GND
          connect_pads: 'yes'
          remove_islands: 'always'
          points:
            [[-127, -90.5], [127, -90.5], [127, 26], [-127, 26]]
