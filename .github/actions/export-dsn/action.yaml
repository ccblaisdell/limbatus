name: 'Export DSN'
description: 'Export Specctra DSN from a Kicad PCB'
inputs:
  boards:
    description: 'KiCad PCB names'
    required: true
runs:
  using: 'docker'
  # KiCad 9 exports a richer Specctra DSN (finer pad/keepout geometry) than
  # KiCad 8; freerouting completes the dense 2-layer matrix on it with 0
  # unrouted nets, where the KiCad 8 DSN leaves the center column crossings
  # (C1/C2/R4) stuck. Keep this in sync with the other two actions' image.
  image: 'docker://ghcr.io/inti-cmnb/kicad9_auto:latest'
  entrypoint: '/bin/bash'
  args:
    - '-c'
    - |
      for board in ${{ inputs.boards }};
      do
        echo "Processing $board";
        if [ -e $GITHUB_WORKSPACE/pcbs/${board}.dsn ]; then
          echo "Cleaning up $GITHUB_WORKSPACE/pcbs/${board}.dsn";
          rm -f $GITHUB_WORKSPACE/pcbs/${board}.dsn;
        fi
        if [ -e pcbs/${board}.kicad_pcb ]; then
          echo "Export DSN";
          $GITHUB_WORKSPACE/kibot/export_dsn.py -b $GITHUB_WORKSPACE/pcbs/${board}.kicad_pcb -o $GITHUB_WORKSPACE/pcbs/${board}.dsn 
        fi
      done
