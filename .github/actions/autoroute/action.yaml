name: 'Autoroute'
description: 'Autoroute a given DSN file to SES with FreeRouting'
inputs:
  boards:
    description: 'Specctra SES output file'
    required: true
  jar:
    description: 'Path (in the workspace) to the freerouting jar to run. The workflow downloads a pinned release before this step.'
    required: false
    default: 'freerouting.jar'
  max_passes:
    description: 'Upper bound on autorouter passes (honored by freerouting >= 2.2.0; still writes .ses)'
    required: false
    default: '25'
  timeout:
    description: 'Hard wall-clock ceiling per board, in seconds. Backstop only -- fails the step (exit 124) if freerouting runs away.'
    required: false
    default: '600'
runs:
  using: 'docker'
  # Pinned JDK 25 image: freerouting 2.2.x jars are compiled for Java 25 (class
  # file 69). The old ceoloide/ergogen-freerouting image only ships freerouting
  # 2.1.0 on an older JDK -- and 2.1.0 IGNORES the pass cap in headless mode
  # (fixed in 2.2.0, freerouting#522), which let stuck routes run 800+ passes.
  # We bring our own pinned freerouting jar (downloaded by the workflow) instead.
  image: 'docker://eclipse-temurin:25-jre'
  entrypoint: '/bin/sh'
  args:
    - '-c'
    - |
      for board in ${{ inputs.boards }};
      do
        echo "Processing $board";
        if [ -e pcbs/${board}.ses ]; then
          echo "Cleaning up pcbs/${board}.ses";
          rm -f pcbs/${board}.ses;
        fi
        if [ -e pcbs/${board}.dsn ]; then
          echo "Autoroute PCB";
          # `-mp` caps the autorouter passes. This is honored only by freerouting
          # >= 2.2.0 in headless mode (freerouting#522); the pinned jar is 2.2.x,
          # so a struggling route stops after N passes and still writes a .ses
          # (possibly with a few unrouted nets -- the pre-existing re-run-to-fix
          # flakiness, not a new failure mode).
          AUTOROUTE_ARGS="-de pcbs/${board}.dsn -do pcbs/${board}.ses -mp ${{ inputs.max_passes }} -mt 1 --gui.enabled=false --profile.email=ccblaisdell@gmail.com"
          if [ -e ./freerouting/freerouting.rules ]; then
            echo "Using custom freerouting rules";
            AUTOROUTE_ARGS="$AUTOROUTE_ARGS -dr ./freerouting/freerouting.rules --user-data-path ./freerouting"
          else
            echo "No ./freerouting/freerouting.rules found; using freerouting defaults";
          fi
          # Hard wall-clock backstop: freerouting has no built-in job timeout, so
          # bound it externally. If the pass cap is ever ignored too, timeout(1)
          # sends SIGTERM at the deadline (SIGKILL 30s later) and the step fails
          # loudly (exit 124) instead of burning 25+ minutes.
          timeout --kill-after=30s "${{ inputs.timeout }}" java -jar "${{ inputs.jar }}" $AUTOROUTE_ARGS
        fi
      done
