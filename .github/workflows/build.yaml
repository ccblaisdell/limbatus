name: Build

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  reproducibility:
    name: Reproducibility (default config)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate with Ergogen
        run: make build

      - name: Verify expected outputs exist
        run: |
          test -f outlines/board.dxf
          test -f pcbs/limbatus.kicad_pcb

      - name: Fail if generated outputs changed
        run: |
          git diff --exit-code -- outlines pcbs

  kibot:
    name: KiBot (default config)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate with Ergogen
        run: make build

      - name: Run Kibot to generate images and gerbers
        uses: ./.github/actions/kibot
        with:
          boards: limbatus
          config: default

      - name: Export DSN file for freerouting
        uses: ./.github/actions/export-dsn
        with:
          boards: limbatus

      - name: Autoroute PCB
        uses: ./.github/actions/autoroute
        with:
          boards: limbatus

      - name: Import SES
        uses: ./.github/actions/import-ses
        with:
          boards: limbatus

      - name: Run Kibot on autorouted board
        uses: ./.github/actions/kibot
        with:
          boards: limbatus_autorouted
          config: boards

      - name: Verify KiBot outputs exist
        run: |
          test -d gerbers
          test -d images
          test -f pcbs/limbatus.dsn
          test -f pcbs/limbatus.ses
          test -f pcbs/limbatus_autorouted.kicad_pcb

      - name: Publish KiBot output
        uses: actions/upload-artifact@v4
        with:
          name: kibot-default
          path: |
            gerbers
            images
            pcbs/limbatus.dsn
            pcbs/limbatus.ses
            pcbs/limbatus_autorouted.kicad_pcb

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: images

  generate:
    name: Generate (${{ matrix.mode_label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode_label: 34-key
            thumb_keys_per_side: 2
            reachy_skip: true
          - mode_label: 36-key
            thumb_keys_per_side: 3
            reachy_skip: false

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Ergogen mode
        run: |
          perl -0pi -e 's/thumb_keys_per_side:\s*\d+/thumb_keys_per_side: ${{ matrix.thumb_keys_per_side }}/' ergogen/config.yaml
          perl -0pi -e 's/\bskip:\s*(true|false)/skip: ${{ matrix.reachy_skip }}/g' ergogen/config.yaml

      - name: Generate with Ergogen
        run: make build

      - name: Verify expected outputs exist
        run: |
          test -f outlines/board.dxf
          test -f pcbs/limbatus.kicad_pcb

      - name: Show generated changes
        run: git status --short

      - name: Publish output
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.mode_label }}
          path: |
            outlines
            pcbs

  deploy-pages:
    name: Deploy Pages
    if: github.ref == 'refs/heads/main'
    needs: kibot
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
