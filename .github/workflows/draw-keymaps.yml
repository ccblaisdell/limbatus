name: Draw ZMK keymaps

# Renders an SVG of each keymap with keymap-drawer and commits it back to the
# repo (into keymap-drawer/). Runs on keymap/layout changes; can also be
# triggered manually.
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"
      - "config/boards/shields/*/*.dtsi"
      - "keymap_drawer.config.yaml"
      - ".github/workflows/draw-keymaps.yml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write # allow the workflow to commit the rendered SVGs (on main)
    with:
      keymap_patterns: "config/*.keymap"
      config_path: "keymap_drawer.config.yaml"
      output_folder: "keymap-drawer"
      # Commit the rendered SVGs only on main (post-merge). On PR branches just
      # render to an artifact: a commit here would be authored by the actions
      # bot, and a bot commit becomes the PR head and spawns approval-gated
      # ("action_required") re-runs of the hardware/firmware builds.
      destination: ${{ github.ref == 'refs/heads/main' && 'commit' || 'artifact' }}
      # limbatus isn't a keyboard keymap-drawer knows about, so we ship the
      # physical layout ourselves: the workflow auto-detects
      # <json_path>/<keymap>.json (QMK-style info.json, a split 3x5 + thumbs)
      # and draws with it. This avoids passing a layout spec on the CLI — the
      # reusable workflow interpolates draw_args into a double-quoted shell
      # context, which eats JSON quotes and splits on spaces.
      json_path: "keymap-drawer"
